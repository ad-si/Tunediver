<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#4B0082" />
    </linearGradient>
  </defs>

  <!-- Background square -->
  <rect width="400" height="400" fill="url(#bgGradient)" />

  <!-- Decorative dots -->
  <circle cx="120" cy="80" r="15" fill="rgba(255,255,255,0.3)" />
  <circle cx="280" cy="120" r="10" fill="rgba(255,255,255,0.2)" />
  <circle cx="90" cy="320" r="10" fill="rgba(255,255,255,0.2)" />
  <circle cx="310" cy="290" r="15" fill="rgba(255,255,255,0.3)" />
</svg>
